<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTIMAR - Sin conexión</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #fff;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }
        button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .status {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .online {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .offline {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📱</div>
        <h1>VERTIMAR SRL</h1>
        <p>No hay conexión a internet en este momento, pero puedes seguir trabajando.</p>
        
        <div class="actions">
            <button onclick="window.location.href='/'">
                🏠 Ir al inicio
            </button>
            <button onclick="window.location.href='/ventas/RegistrarVenta'">
                📝 Registrar pedido offline
            </button>
            <button onclick="window.location.href='/ventas/PedidosOffline'">
                📋 Ver pedidos offline
            </button>
            <button onclick="window.location.reload()">
                🔄 Reintentar conexión
            </button>
        </div>

        <div class="status" id="status">
            <div id="connection-status">🔍 Verificando conexión...</div>
        </div>
    </div>

    <script>
        function updateConnectionStatus() {
            const statusDiv = document.getElementById('connection-status');
            const statusContainer = document.getElementById('status');
            
            if (navigator.onLine) {
                statusDiv.innerHTML = '🌐 Conectado a internet';
                statusContainer.className = 'status online';
            } else {
                statusDiv.innerHTML = '📱 Modo offline';
                statusContainer.className = 'status offline';
            }
        }

        // Verificar estado inicial
        updateConnectionStatus();

        // Escuchar cambios de conectividad
        window.addEventListener('online', () => {
            updateConnectionStatus();
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });

        window.addEventListener('offline', updateConnectionStatus);

        // Verificar periodicamente
        setInterval(updateConnectionStatus, 5000);
    </script>
</body>
</html>
